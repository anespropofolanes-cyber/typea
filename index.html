<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type A 主動脈剝離麻醉管理互動教學</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'JF Jinxuan Latte';
            src: url('jf-jinxuanlatte.otf') format('opentype');
            font-weight: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Tearsfont';
            src: url('tearsfont.otf') format('opentype');
            font-weight: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* ── Backgrounds ── */
            --bg-main:       #d3d2c9;   /* 主背景：暖淺灰 */
            --bg-card:       #ffffff;   /* 純白卡片 */
            --bg-secondary:  #eef2f6;   /* 卡片內次要區塊：淡藍灰 */
            --bg-hover:      #dce6f0;

            /* ── Blue primary ── */
            --blue:          #095ca8;   /* 深藍 */
            --blue-mid:      #3a7fc1;   /* 中藍 */
            --blue-light:    #b6c6d7;   /* 淡藍 */
            --blue-pale:     #e8eef5;   /* 極淡藍 */

            /* ── Wrong / 錯誤 ── */
            --rose:          #c0624e;
            --rose-pale:     #fdf1ee;
            --rose-border:   #e8b0a0;

            /* ── Text on cards ── */
            --text-h:        #0d2540;   /* 深藍黑 */
            --text-body:     #1e3450;
            --text-sub:      #4e6070;
            --text-muted:    #8898a8;

            /* ── Text on dark bg → 白 ── */
            --text-on-dark:  #ffffff;

            /* ── Borders ── */
            --border:        #c8d4de;
            --border-strong: #a8bccc;
        }

        /* ═══════════════════════════════════ BASE ══ */
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-main);
            background-image:
                radial-gradient(circle at 0% 100%, rgba(182,198,215,.35) 0%, transparent 50%),
                radial-gradient(circle at 100%  0%, rgba(9, 92,168,.08)  0%, transparent 50%);
            color: var(--text-body);
            line-height: 1.8;
            min-height: 100vh;
        }

        /* ═══════════════════════════════════ LAYOUT ══ */
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 56px 28px 80px;
        }

        /* ═══════════════════════════════════ HEADER ══ */
        header {
            margin-bottom: 48px;
            padding-bottom: 28px;
            border-bottom: 1.5px solid var(--border);
        }
        .header-title-row {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 10px;
        }
        .header-logo {
            height: 56px;
            width: auto;
            flex-shrink: 0;
        }
        .header-eyebrow {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--blue-mid);
            margin-bottom: 10px;
        }
        h1 {
            font-family: 'JF Jinxuan Latte', 'Noto Sans TC', serif;
            font-size: clamp(1.9rem, 5vw, 2.6rem);
            color: var(--text-h);
            font-weight: normal;
            letter-spacing: 0.03em;
            line-height: 1.25;
            margin-bottom: 10px;
        }
        h1 em {
            font-style: normal;
            color: var(--blue);
        }
        .header-sub {
            font-family: 'DM Mono', monospace;
            font-size: 0.78rem;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* ═══════════════════════════════════ PROGRESS ══ */
        .progress-wrap {
            margin-bottom: 36px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px 24px;
        }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }
        .progress-meta-label {
            font-size: 0.88rem;
            color: var(--text-sub);
        }
        .progress-meta-count {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            color: var(--blue-mid);
        }
        .progress-track {
            height: 5px;
            background: var(--blue-pale);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue) 0%, var(--blue-mid) 100%);
            border-radius: 3px;
            transition: width .7s cubic-bezier(.4,0,.2,1);
        }
        /* step dots */
        .progress-dots {
            display: flex;
            gap: 6px;
            margin-top: 12px;
        }
        .progress-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--blue-light);
            transition: background .4s;
        }
        .progress-dot.done   { background: var(--blue-mid); }
        .progress-dot.active { background: var(--blue); transform: scale(1.3); }

        /* ═══════════════════════════════════ CARD ══ */
        .card {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 44px 48px;
            margin-bottom: 24px;
            box-shadow: 0 3px 14px rgba(100,60,70,.08), 0 1px 3px rgba(100,60,70,.06);
            transition: box-shadow .3s;
        }
        @media (max-width: 600px) {
            .card { padding: 28px 22px; }
        }

        /* ═══════════════════════════════════ STAGE HEADER ══ */
        .stage-header {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            margin-bottom: 32px;
            padding-bottom: 28px;
            border-bottom: 1.5px solid var(--bg-secondary);
            position: relative;
        }
        .stage-number-wrap {
            flex-shrink: 0;
            width: 64px; height: 64px;
            border-radius: 12px;
            background: var(--blue);
            display: flex; align-items: center; justify-content: center;
        }
        .stage-number {
            font-family: 'Tearsfont', 'DM Mono', monospace;
            font-size: 2rem;
            color: #ffffff;
            line-height: 1;
            letter-spacing: -0.03em;
        }
        .stage-title h2 {
            font-family: 'JF Jinxuan Latte', 'Noto Sans TC', serif;
            font-size: 1.5rem;
            font-weight: normal;
            color: var(--text-h);
            letter-spacing: 0.02em;
            margin-bottom: 5px;
        }
        .stage-title p {
            font-family: 'DM Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--blue-mid);
        }

        /* ═══════════════════════════════════ SCENARIO ══ */
        .scenario {
            background: var(--bg-secondary);
            border-left: 4px solid var(--yellow);
            padding: 24px 28px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 32px;
            font-size: 0.97rem;
            line-height: 1.9;
            color: var(--text-body);
        }

        /* ═══════════════════════════════════ CHOICES ══ */
        .choices {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
        }
        .choice-btn {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 16px 20px;
            text-align: left;
            cursor: pointer;
            transition: border-color .2s, background .2s, transform .15s;
            font-size: 0.95rem;
            color: var(--text-body);
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.75;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .choice-btn:hover {
            border-color: var(--blue-light);
            background: var(--blue-pale);
        }
        .choice-badge {
            flex-shrink: 0;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-family: 'DM Mono', monospace;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-sub);
            transition: all .2s;
            margin-top: 1px;
        }
        .choice-btn:hover .choice-badge {
            background: var(--blue-light);
            border-color: var(--blue-mid);
            color: #ffffff;
        }
        .choice-btn.correct {
            border-color: var(--blue);
            background: var(--blue-pale);
        }
        .choice-btn.correct .choice-badge {
            background: var(--blue);
            border-color: var(--blue);
            color: #ffffff;
        }
        .choice-btn.wrong {
            border-color: var(--rose-border);
            background: var(--rose-pale);
        }
        .choice-btn.wrong .choice-badge {
            background: var(--rose);
            border-color: var(--rose);
            color: #fff;
        }
        .choice-btn.disabled {
            opacity: .55;
            cursor: not-allowed;
            pointer-events: none;
        }
        .choice-text { flex: 1; }

        /* ═══════════════════════════════════ FEEDBACK ══ */
        .feedback {
            margin-top: 20px;
            padding: 22px 26px;
            border-radius: 8px;
            border: 1.5px solid;
            font-size: 0.94rem;
            line-height: 1.85;
        }
        .feedback.correct {
            background: var(--blue-pale);
            border-color: var(--blue-light);
        }
        .feedback.wrong {
            background: var(--rose-pale);
            border-color: var(--rose-border);
        }
        .feedback-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .feedback.correct .feedback-title { color: var(--blue); }
        .feedback.wrong   .feedback-title { color: var(--rose); }

        /* ═══════════════════════════════════ KEY POINTS ══ */
        .key-points {
            background: var(--bg-secondary);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            padding: 26px 30px;
            margin-top: 20px;
        }
        .key-points h3 {
            font-family: 'JF Jinxuan Latte', 'Noto Sans TC', serif;
            font-weight: normal;
            font-size: 1.05rem;
            color: var(--text-h);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .key-points h3 svg { color: var(--blue); }
        .key-points h4 {
            color: var(--blue);
            font-size: .96rem;
            font-weight: 600;
            margin: 16px 0 8px;
        }
        .key-points ul { list-style: none; padding: 0; }
        .key-points li {
            padding-left: 22px;
            margin-bottom: 10px;
            position: relative;
            font-size: 0.92rem;
            line-height: 1.75;
            color: var(--text-body);
        }
        .key-points li::before {
            content: '—';
            position: absolute; left: 0;
            color: var(--blue-light);
            font-weight: 700;
        }

        /* ═══════════════════════════════════ BUTTONS ══ */
        .btn {
            background: #494342;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            padding: 14px 38px;
            font-size: 0.94rem;
            font-weight: 600;
            font-family: 'JF Jinxuan Latte', 'Noto Sans TC', sans-serif;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: background .25s, transform .15s, box-shadow .25s;
        }
        .btn:hover {
            background: #2e2b2a;
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(73,67,66,.28);
        }
        .btn:active { transform: translateY(0); box-shadow: none; }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 36px;
        }

        /* ═══════════════════════════════════ INTRO SCREEN ══ */
        .intro-screen { text-align: left; }

        /* Section header inside intro-graphic */
        .section-head {
            font-family: 'JF Jinxuan Latte', 'Noto Sans TC', serif;
            font-weight: normal;
            font-size: 1.4rem;
            color: var(--text-h);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-head::before {
            content: '';
            display: inline-block;
            width: 10px; height: 10px;
            background: var(--blue-light);
            border: 1.5px solid var(--blue-mid);
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Stanford classification */
        .stanford-grid {
            display: grid;
            gap: 0;
            margin: 0 0 36px;
        }
        .stanford-item {
            padding: 24px 0;
            border-bottom: 1.5px solid var(--border);
        }
        .stanford-item:last-child { border-bottom: none; }
        .stanford-item h3 {
            font-family: 'Tearsfont', 'DM Mono', monospace;
            font-size: 1.35rem;
            font-weight: normal;
            margin-bottom: 10px;
        }
        .stanford-item.type-a h3 { color: var(--rose); }
        .stanford-item.type-b h3 { color: var(--purple); }
        .stanford-item p { font-size: 0.96rem; line-height: 1.85; }
        .stanford-item .note {
            display: inline-block;
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Checklist */
        .checklist-section { margin-top: 40px; }
        .checklist-section-head {
            font-family: 'JF Jinxuan Latte', 'Noto Sans TC', serif;
            font-weight: normal;
            font-size: 1.25rem;
            color: #494342;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .checklist-section-head svg { color: #6fa85c; }
        details.checklist-card {
            border-bottom: 1.5px solid var(--border);
            margin-bottom: 0;
        }
        details.checklist-card summary {
            list-style: none;
            padding: 16px 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1rem;
            font-weight: 600;
            user-select: none;
        }
        details.checklist-card summary::-webkit-details-marker { display: none; }
        details.checklist-card summary:hover { opacity: .75; }
        details.checklist-card summary .arrow {
            transition: transform .3s;
            flex-shrink: 0;
            color: var(--text-muted);
        }
        details.checklist-card[open] summary .arrow { transform: rotate(180deg); }
        details.checklist-card .detail-body {
            padding: 12px 0 20px;
            display: grid;
            gap: 10px;
            font-size: 0.93rem;
            line-height: 1.8;
            color: var(--text-body);
        }
        .detail-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .detail-bullet { flex-shrink: 0; font-weight: 700; }

        /* Learn objectives */
        .learn-objectives { margin-top: 40px; }
        .learn-objectives h3 {
            font-family: 'JF Jinxuan Latte', 'Noto Sans TC', serif;
            font-weight: normal;
            font-size: 1.2rem;
            color: var(--text-h);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .learn-objectives ul { list-style: none; padding: 0; }
        .learn-objectives li {
            padding-left: 22px;
            position: relative;
            margin-bottom: 10px;
            font-size: 0.95rem;
            line-height: 1.8;
        }
        .learn-objectives li::before {
            content: '—';
            position: absolute; left: 0;
            color: #6fa85c;
            font-weight: 600;
        }

        /* ═══════════════════════════════════ SUMMARY TABLE ══ */
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.88rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .summary-table th {
            background: var(--blue-pale);
            color: var(--blue);
            padding: 13px 16px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
        }
        .summary-table td {
            padding: 13px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
            vertical-align: top;
            line-height: 1.65;
        }
        .summary-table tr:last-child td { border-bottom: none; }
        .summary-table tr:hover td { background: var(--bg-secondary); }
        .summary-table code {
            font-family: 'DM Mono', monospace;
            background: var(--blue-pale);
            color: var(--blue);
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 0.84em;
        }

        /* ═══════════════════════════════════ COMPLETION ══ */
        .completion-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--blue);
            color: #ffffff;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
        }

        /* ═══════════════════════════════════ MISC ══ */
        strong { color: var(--blue); font-weight: 700; }

        .hidden { display: none !important; }

        /* alert boxes used in some feedback */
        .alert-box {
            padding: 18px 22px;
            border-radius: 8px;
            border: 1.5px solid;
            margin: 16px 0;
            font-size: 0.93rem;
            line-height: 1.75;
        }
        .alert-box.warning {
            background: var(--gold-pale);
            border-color: #e8d9a0;
            color: var(--text-body);
        }
        .alert-box.danger {
            background: var(--rose-pale);
            border-color: var(--rose-border);
            color: var(--text-body);
        }

        /* ═══════════════════════════════════ RESPONSIVE ══ */
        @media (max-width: 640px) {
            .stage-number-wrap { width: 52px; height: 52px; }
            .stage-number { font-size: 1.6rem; }
            .stage-title h2 { font-size: 1.25rem; }
            .summary-table { font-size: 0.8rem; }
            .summary-table td, .summary-table th { padding: 10px 12px; }
        }
    </style>
</head>
<body>
<div class="container">

    <header>

    const stage = stages[index];
    const area  = document.getElementById('content-area');

    if (stage.type === 'intro') {
        area.innerHTML = `<div class="card">${stage.content}</div>`;
        updateProgress(0, '準備開始');
    } else if (stage.type === 'summary') {
        area.innerHTML = `<div class="card">${stage.content}</div>`;
        updateProgress(8, '完成！');
    } else {
        const choicesHTML = stage.choices.map((c, i) => `
            <button class="choice-btn" onclick="selectChoice(${i})">
                <span class="choice-badge">${c.label}</span>
                <span class="choice-text">${c.text}</span>
            </button>
        `).join('');

        area.innerHTML = `
            <div class="card">
                <div class="stage-header">
                    <div class="stage-number-wrap">
                        <div class="stage-number">${stage.number}</div>
                    </div>
                    <div class="stage-title">
                        <h2>${stage.title}</h2>
                        <p>${stage.subtitle}</p>
                    </div>
                </div>
                <div class="scenario">${stage.scenario}</div>
                <div class="choices" id="choices">${choicesHTML}</div>
                <div id="feedback-area"></div>
                <div id="next-btn-area"></div>
            </div>
        `;
        updateProgress(stage.number, `步驟 ${stage.number}：${stage.title}`);
    }
}

function selectChoice(idx) {
    const stage   = stages[currentStage];
    const choice  = stage.choices[idx];
    const feedbackArea = document.getElementById('feedback-area');
    const nextArea     = document.getElementById('next-btn-area');
    const btns = document.querySelectorAll('.choice-btn');

    btns.forEach((btn, i) => {
        btn.classList.add('disabled');
        if (i === idx) btn.classList.add(choice.correct ? 'correct' : 'wrong');
    });

    feedbackArea.innerHTML = `
        <div class="feedback ${choice.correct ? 'correct' : 'wrong'}">
            <div class="feedback-title">
                <span>${choice.correct ? '✓ 答對了！' : '✗ 再想想'}</span>
            </div>
            <div>${choice.feedback}</div>
        </div>
    `;

    if (choice.correct) {
        score++;
        feedbackArea.innerHTML += `
            <div class="key-points">
                <h3>
                    <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
                        <path d="M3 10l5 5 9-9" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    本步驟關鍵知識
                </h3>
                <ul>${stage.keyPoints.map(p => `<li>${p}</li>`).join('')}</ul>
            </div>
        `;
        nextArea.innerHTML = `
            <div class="btn-container">
                <button class="btn" onclick="nextStage()">進入下一步驟 →</button>
            </div>
        `;
    }
}

function nextStage() {
    currentStage++;
    renderStage(currentStage);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateProgress(step, text) {
    document.getElementById('progress-fill').style.width = `${(step / 8) * 100}%`;
    document.getElementById('progress-text').textContent = text;
    document.getElementById('progress-percent').textContent = `${step} / 8`;

    const dots = document.querySelectorAll('.progress-dot');
    dots.forEach((d, i) => {
        d.className = 'progress-dot';
        if (i < step)       d.classList.add('done');
        else if (i === step) d.classList.add('active');
    });
}

renderStage(0);
</script>
</body>
</html>
