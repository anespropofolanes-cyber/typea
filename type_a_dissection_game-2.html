<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type A 主動脈剝離麻醉管理互動教學</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 文青配色系統 - 柔和、典雅 */
            --bg-main: #f8f6f3;
            --bg-card: #fffefb;
            --bg-secondary: #f2ede7;
            --bg-accent: #e8e3db;
            
            /* 主色調 - 墨綠色系 */
            --primary: #3d5a4c;
            --primary-light: #5a7a68;
            --primary-lighter: #d4e0d9;
            --primary-dark: #2a3f34;
            
            /* 輔助色 */
            --accent: #8b7355;
            --accent-light: #b39a7d;
            --accent-bg: #f5f1ec;
            
            /* 警示色 - 柔和版本 */
            --danger: #b85a4f;
            --danger-bg: #fdf5f4;
            --danger-border: #e8ccc8;
            
            --warning: #c99a5f;
            --warning-bg: #fdf9f3;
            --warning-border: #ead8c3;
            
            --success: #5a8b73;
            --success-bg: #f3f8f6;
            --success-border: #c8e0d5;
            
            /* 文字 */
            --text-primary: #2a2420;
            --text-secondary: #5a5550;
            --text-tertiary: #8a857f;
            --text-muted: #b5b0aa;
            
            /* 邊框 */
            --border: #e0dbd5;
            --border-strong: #cac5bf;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            line-height: 1.75;
            min-height: 100vh;
        }

        /* 紙張質感背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.01) 2px,
                    rgba(0,0,0,0.01) 4px
                );
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 48px 24px;
        }

        /* Header - 優雅的頂部 */
        header {
            text-align: center;
            margin-bottom: 64px;
            padding-bottom: 32px;
            border-bottom: 2px solid var(--border);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 2.8rem);
            margin-bottom: 16px;
            color: var(--primary-dark);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .subtitle {
            font-family: 'DM Mono', monospace;
            color: var(--text-tertiary);
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Progress Bar - 簡約風格 */
        .progress-container {
            margin: 40px 0;
            padding: 24px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-secondary);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Cards - 紙張質感 */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(42, 36, 32, 0.04), 
                        0 1px 2px rgba(42, 36, 32, 0.06);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 4px 16px rgba(42, 36, 32, 0.08), 
                        0 2px 4px rgba(42, 36, 32, 0.08);
            border-color: var(--border-strong);
        }

        /* Stage Display */
        .stage-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 2px solid var(--bg-secondary);
        }

        .stage-number {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            min-width: 80px;
            opacity: 0.5;
        }

        .stage-title {
            flex: 1;
        }

        .stage-title h2 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-dark);
            letter-spacing: -0.01em;
        }

        .stage-title p {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.05em;
        }

        /* Scenario - 優雅的引用框 */
        .scenario {
            background: var(--bg-secondary);
            border-left: 3px solid var(--accent);
            padding: 28px 32px;
            border-radius: 4px;
            margin-bottom: 36px;
            font-size: 1.0rem;
            line-height: 1.85;
            color: var(--text-primary);
        }

        /* Choices */
        .choices {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 32px;
        }

        .choice-btn {
            background: var(--bg-card);
            border: 1.5px solid var(--border);
            border-radius: 6px;
            padding: 20px 24px;
            text-align: left;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 0.98rem;
            color: var(--text-primary);
            font-family: 'Noto Sans TC', sans-serif;
            line-height: 1.7;
        }

        .choice-btn:hover {
            border-color: var(--primary);
            background: var(--primary-lighter);
        }

        .choice-btn.correct {
            border-color: var(--success);
            background: var(--success-bg);
            border-width: 2px;
        }

        .choice-btn.wrong {
            border-color: var(--danger);
            background: var(--danger-bg);
            border-width: 2px;
        }

        .choice-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .choice-label {
            font-weight: 600;
            color: var(--accent);
            font-family: 'DM Mono', monospace;
            margin-bottom: 10px;
            display: block;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        /* Feedback */
        .feedback {
            margin-top: 24px;
            padding: 24px 28px;
            border-radius: 6px;
            border: 1.5px solid;
        }

        .feedback.correct {
            background: var(--success-bg);
            border-color: var(--success-border);
            color: var(--text-primary);
        }

        .feedback.wrong {
            background: var(--danger-bg);
            border-color: var(--danger-border);
            color: var(--text-primary);
        }

        .feedback-title {
            font-weight: 600;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.05rem;
        }

        .feedback.correct .feedback-title {
            color: var(--success);
        }

        .feedback.wrong .feedback-title {
            color: var(--danger);
        }

        /* Key Points */
        .key-points {
            background: var(--accent-bg);
            border: 1.5px solid var(--border);
            border-radius: 6px;
            padding: 28px 32px;
            margin-top: 24px;
        }

        .key-points h3 {
            color: var(--primary-dark);
            margin-bottom: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .key-points h4 {
            color: var(--primary);
            margin-bottom: 12px;
            margin-top: 20px;
            font-size: 1.0rem;
            font-weight: 600;
        }

        .key-points ul {
            list-style: none;
            padding-left: 0;
        }

        .key-points li {
            padding-left: 24px;
            margin-bottom: 12px;
            position: relative;
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .key-points li::before {
            content: '—';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: 400;
        }

        /* Buttons */
        .btn {
            background: var(--primary);
            border: none;
            border-radius: 6px;
            padding: 16px 40px;
            font-size: 0.95rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans TC', sans-serif;
            letter-spacing: 0.02em;
        }

        .btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(61, 90, 76, 0.25);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 32px;
        }

        /* Introduction Screen */
        .intro-screen {
            text-align: center;
        }

        .intro-graphic {
            margin: 40px 0;
            padding: 40px;
            background: var(--bg-card);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .stanford-classification {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .classification-item {
            text-align: center;
            flex: 1;
            min-width: 200px;
            padding: 28px;
            background: var(--bg-secondary);
            border-radius: 6px;
            border: 1.5px solid var(--border);
        }

        .classification-item h3 {
            color: var(--primary);
            margin-bottom: 16px;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .classification-item p {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .aorta-diagram {
            margin: 40px auto;
            max-width: 500px;
        }

        /* Summary Table */
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .summary-table th {
            background: var(--bg-secondary);
            color: var(--primary-dark);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--border-strong);
        }

        .summary-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-card);
        }

        .summary-table tr:last-child td {
            border-bottom: none;
        }

        .summary-table tr:hover td {
            background: var(--bg-secondary);
        }

        .summary-table code {
            font-family: 'DM Mono', monospace;
            background: var(--bg-secondary);
            padding: 3px 8px;
            border-radius: 3px;
            color: var(--primary);
            font-size: 0.85em;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 32px 20px;
            }

            .card {
                padding: 28px 24px;
            }

            .stage-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 16px;
            }

            .stage-number {
                font-size: 2.5rem;
            }

            .stanford-classification {
                flex-direction: column;
                gap: 16px;
            }
            
            /* 術前準備區塊行動裝置優化 */
            .intro-screen h3 {
                font-size: 1.1rem !important;
            }
            
            .intro-screen > div > div {
                padding: 20px 24px !important;
            }
            
            .intro-screen h4 {
                font-size: 0.95rem !important;
            }
            
            .intro-screen div[style*="display: flex"] {
                line-height: 1.8 !important;
                word-break: break-word !important;
            }
            
            .intro-screen div[style*="display: flex"] span:last-child {
                flex: 1;
                min-width: 0;
            }
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }

        /* Completion badge */
        .completion-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--primary);
            color: white;
            padding: 16px 36px;
            border-radius: 6px;
            font-weight: 600;
            margin: 24px auto;
            font-size: 1.05rem;
            letter-spacing: 0.02em;
        }

        /* SVG icons color */
        .key-points svg,
        .completion-badge svg {
            color: currentColor;
        }

        /* Alert boxes */
        .alert-box {
            padding: 20px 24px;
            border-radius: 6px;
            margin: 20px 0;
            border: 1.5px solid;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .alert-box.warning {
            background: var(--warning-bg);
            border-color: var(--warning-border);
            color: var(--text-primary);
        }

        .alert-box.danger {
            background: var(--danger-bg);
            border-color: var(--danger-border);
            color: var(--text-primary);
        }

        /* Strong emphasis */
        strong {
            color: var(--primary-dark);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Type A 主動脈剝離麻醉管理</h1>
            <p class="subtitle">STANFORD TYPE A AORTIC DISSECTION ANESTHETIC MANAGEMENT</p>
        </header>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-label">
                <span id="progress-text">準備開始</span>
                <span id="progress-percent">0/8</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <!-- Content Area -->
        <div id="content-area"></div>
    </div>

    <script>
        // Game State
        let currentStage = 0;
        let score = 0;

        // Stage Data
        const stages = [
            // Introduction
            {
                type: 'intro',
                title: '認識 Type A 主動脈剝離',
                content: `
                    <div class="intro-screen">
                        <div class="intro-graphic">
                            <h2 style="color: var(--accent); margin-bottom: 32px; font-size: 1.5rem; font-weight: 600; text-align: center;">Stanford 分類</h2>
                            
                            <div style="display: grid; gap: 32px; margin: 32px 0;">
                                <div style="padding: 24px 0; border-bottom: 2px solid var(--border);">
                                    <h3 style="color: var(--primary); font-size: 1.3rem; margin-bottom: 16px; font-weight: 600;">Type A</h3>
                                    <p style="color: var(--text-primary); line-height: 1.9; font-size: 1.0rem; margin-bottom: 12px;">
                                        <strong>涉及升主動脈</strong>（ascending aorta）<br>
                                        無論剝離是否延伸至主動脈弓或降主動脈，只要牽涉升主動脈即為 Type A
                                    </p>
                                    <p style="color: var(--danger); line-height: 1.8; font-size: 0.95rem; margin-top: 12px;">
                                        需緊急手術 | 未治療死亡率：1-2%/小時
                                    </p>
                                </div>
                                
                                <div style="padding: 24px 0;">
                                    <h3 style="color: var(--warning); font-size: 1.3rem; margin-bottom: 16px; font-weight: 600;">Type B</h3>
                                    <p style="color: var(--text-primary); line-height: 1.9; font-size: 1.0rem; margin-bottom: 12px;">
                                        <strong>僅涉及降主動脈</strong>（descending aorta）<br>
                                        剝離起始於左鎖骨下動脈遠端，未涉及升主動脈
                                    </p>
                                    <p style="color: var(--text-secondary); line-height: 1.8; font-size: 0.95rem; margin-top: 12px;">
                                        通常採藥物治療控制血壓，穩定後評估是否需手術或 TEVAR
                                    </p>
                                </div>
                            </div>
                            
                            <div style="margin-top: 32px; padding: 20px 0; border-top: 2px solid var(--border); margin-bottom: 40px;">
                                <p style="color: var(--text-secondary); line-height: 1.8; font-size: 0.93rem; text-align: center;">
                                    <strong style="color: var(--primary-dark);">關鍵區分：</strong>升主動脈是否受累
                                </p>
                            </div>
                            

                            <div style="margin-top: 40px;">
                                <h3 style="color: var(--primary-dark); margin-bottom: 28px; font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; gap: 12px;">
                                    <svg width="24" height="24" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M10 18C14.4183 18 18 14.4183 18 10C18 5.58172 14.4183 2 10 2C5.58172 2 2 5.58172 2 10C2 14.4183 5.58172 18 10 18Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M10 6V10L13 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                    術前準備 Checklist
                                </h3>
                                
                                <!-- 監測設備準備 -->
                                <details class="checklist-card" style="margin-bottom: 20px;">
                                    <summary style="padding: 16px 0; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 1.05rem; color: var(--primary); user-select: none; border-bottom: 2px solid var(--border);">
                                        <span>監測設備準備</span>
                                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="transition: transform 0.3s;">
                                            <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </summary>
                                    <div style="padding: 16px 0 8px 0; display: grid; gap: 12px; font-size: 0.95rem; line-height: 1.8; color: var(--text-primary); text-align: left; text-align: left;">
                                        <div style="display: flex; gap: 12px; align-items: flex-start;">
                                            <span style="color: var(--accent); flex-shrink: 0;">•</span>
                                            <span>Arterial line kit ×2（考慮雙側上肢，20G radial）</span>
                                        </div>
                                        <div style="display: flex; gap: 12px; align-items: flex-start;">
                                            <span style="color: var(--accent); flex-shrink: 0;">•</span>
                                            <span>CVP kit（Triple lumen 或 Cordis introducer 8.5Fr）</span>
                                        </div>
                                        <div style="display: flex; gap: 12px; align-items: flex-start;">
                                            <span style="color: var(--accent); flex-shrink: 0;">•</span>
                                            <span>TEE probe + 消毒套組</span>
                                        </div>
                                        <div style="display: flex; gap: 12px; align-items: flex-start;">
                                            <span style="color: var(--accent); flex-shrink: 0;">•</span>
                                            <span>5-lead ECG + Defibrillator pads</span>
                                        </div>
                                        <div style="display: flex; gap: 12px; align-items: flex-start;">
                                            <span style="color: var(--accent); flex-shrink: 0;">•</span>
                                            <span>Temperature probe, NIRS monitor</span>
                                        </div>
                                    </div>
                                </details>

                                <!-- 藥物準備 -->
                                <details class="checklist-card" style="margin-bottom: 20px;">
                                    <summary style="padding: 16px 0; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 1.05rem; color: var(--warning); user-select: none; border-bottom: 2px solid var(--border);">
                                        <span>藥物準備</span>
                                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="transition: transform 0.3s;">
                                            <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </summary>
                                    <div style="padding: 16px 0 8px 0; display: grid; gap: 12px; font-size: 0.95rem; line-height: 1.8; color: var(--text-primary); text-align: left;">
                                        <div style="display: flex; gap: 12px; align-items: flex-start;">
                                            <span style="color: var(--warning); flex-shrink: 0;">•</span>
                                            <span><strong>血流動力學：</strong>Labetalol、Esmolol、Nicardipine、Morphine/Fentanyl</span>
                                        </div>
                                        <div style="display: flex; gap: 12px; align-items: flex-start;">
                                            <span style="color: var(--warning); flex-shrink: 0;">•</span>
                                            <span><strong>誘導：</strong>Fentanyl 500 mcg、Etomidate 40 mg、Rocuronium 100 mg</span>
                                        </div>
                                        <div style="display: flex; gap: 12px; align-items: flex-start;">
                                            <span style="color: var(--warning); flex-shrink: 0;">•</span>
                                            <span><strong>插管前：</strong>Esmolol 100 mg、Lidocaine 100 mg</span>
                                        </div>
                                        <div style="display: flex; gap: 12px; align-items: flex-start;">
                                            <span style="color: var(--warning); flex-shrink: 0;">•</span>
                                            <span><strong>急救：</strong>Phenylephrine、Ephedrine、Nitroglycerin、Epinephrine</span>
                                        </div>
                                    </div>
                                </details>

                                <!-- 輸血準備 -->
                                <details class="checklist-card" style="margin-bottom: 20px;">
                                    <summary style="padding: 16px 0; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 1.05rem; color: var(--danger); user-select: none; border-bottom: 2px solid var(--border);">
                                        <span>輸血準備</span>
                                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="transition: transform 0.3s;">
                                            <path d="M5 7.5L10 12.5L15 7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                        </svg>
                                    </summary>

        // Initialize
        function init() {
            renderStage(0);
        }

        // Render Stage
        function renderStage(index) {
            const stage = stages[index];
            const contentArea = document.getElementById('content-area');
            
            if (stage.type === 'intro') {
                contentArea.innerHTML = `
                    <div class="card">
                        ${stage.content}
                    </div>
                `;
                updateProgress(0, '準備開始');
            } else if (stage.type === 'summary') {
                contentArea.innerHTML = `
                    <div class="card">
                        ${stage.content}
                    </div>
                `;
                updateProgress(8, '完成！');
            } else {
                // Regular stage - choices in A, B, C, D order (no randomization)
                let choicesHTML = stage.choices.map((choice, idx) => `
                    <button class="choice-btn" onclick="selectChoice(${idx})">
                        <span class="choice-label">${choice.label}</span>
                        <div>${choice.text}</div>
                    </button>
                `).join('');

                contentArea.innerHTML = `
                    <div class="card">
                        <div class="stage-header">
                            <div class="stage-number">${stage.number}</div>
                            <div class="stage-title">
                                <h2>${stage.title}</h2>
                                <p>${stage.subtitle}</p>
                            </div>
                        </div>

                        <div class="scenario">
                            ${stage.scenario}
                        </div>

                        <div class="choices" id="choices">
                            ${choicesHTML}
                        </div>

                        <div id="feedback-area"></div>
                        <div id="next-btn-area"></div>
                    </div>
                `;

                updateProgress(stage.number, `步驟 ${stage.number}: ${stage.title}`);
            }
        }

        // Select Choice
        function selectChoice(choiceIndex) {
            const stage = stages[currentStage];
            const choice = stage.choices[choiceIndex];
            const feedbackArea = document.getElementById('feedback-area');
            const nextBtnArea = document.getElementById('next-btn-area');
            const choiceBtns = document.querySelectorAll('.choice-btn');

            // Disable all choices
            choiceBtns.forEach((btn, idx) => {
                btn.classList.add('disabled');
                if (idx === choiceIndex) {
                    btn.classList.add(choice.correct ? 'correct' : 'wrong');
                }
            });

            // Show feedback
            feedbackArea.innerHTML = `
                <div class="feedback ${choice.correct ? 'correct' : 'wrong'}">
                    <div class="feedback-title">
                        <span class="feedback-icon">${choice.correct ? '✓' : '✗'}</span>
                        ${choice.correct ? '答對了！' : '再想想'}
                    </div>
                    <div>${choice.feedback}</div>
                </div>
            `;

            if (choice.correct) {
                score++;
                // Show key points
                feedbackArea.innerHTML += `
                    <div class="key-points">
                        <h3 style="display: flex; align-items: center; gap: 10px;">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M3 10L8 15L17 6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            本步驟關鍵知識
                        </h3>
                        <ul>
                            ${stage.keyPoints.map(point => `<li>${point}</li>`).join('')}
                        </ul>
                    </div>
                `;

                // Show next button
                nextBtnArea.innerHTML = `
                    <div class="btn-container">
                        <button class="btn" onclick="nextStage()">進入下一步驟 →</button>
                    </div>
                `;
            }
        }

        // Next Stage
        function nextStage() {
            currentStage++;
            renderStage(currentStage);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Update Progress
        function updateProgress(step, text) {
            const progressFill = document.getElementById('progress-fill');
            const progressText = document.getElementById('progress-text');
            const progressPercent = document.getElementById('progress-percent');

            const percentage = (step / 8) * 100;
            progressFill.style.width = `${percentage}%`;
            progressText.textContent = text;
            progressPercent.textContent = `${step}/8`;
        }

        // Start
        init();
    </script>
